body:
  text: 法華靈驗傳目次卷上園苡呈祥天花現瑞妙字始成便生勝處題目才寫已脫冥司第一段序品唱題之頃地獄皆空買紙之時天堂已化國王布髮天帝賜金第二段法説周方便品亡婦生天神人指路蓮開臘月佛記天宮第三段比喻品信解品藥草喻品授記品經卷重而罪案輕時患痊而壽笇永夜明如晝時雨普霑爐香不熱而自熏瞽叟無目而能覩第四段因緣周化城喻品羽族慣聞而便脫業軀比丘暗誦而得離鬼難感悟前生之師弟通交二世之爺娘第五段五百弟子授記品授學無學人記品野雉忽爾轉身閻王聳然彈指融酥滿器兵衛盈庭神人警寢而進船天帝收經而入藏第六段法師品見寶塔品鬼莫能害舌不可耕皂客還送本錢仙翁特請一品空中彈指座上生香第七段提婆達多品勸花座身托蓮胎名標花座聖僧教誦海神請聞鴿受人身鬼脫廁報第八段安樂行品龍天請講鬼虎欽風仙鶴來儀野雞轉報瓶水自滿異香普熏經字放光鴆毒無驗第九段從地涌出品如來壽量品分別功德品冥授補闕帝親試通賜壽題肩應病授藥相師已定豈期延壽天帝邀相却向西方卷下湖州天下上座第十段隨喜功德品法師功德品埋即生蓮舌常諷典窰瓦便作蓮花而警俗函經化為草束而拯生經一通而更不忘髮三剪而輒自長第十一段常不輕品如來神力品囑纍品芝生墓側蓮出舌根舍利流出於金文光明照耀於寶塔瓶水冬溫夏冷天兵匝地盈空第十二段藥王菩薩本事品自識前身難通二字檀香遠達佛手親摩藥精入懷池水療病癩瘡即愈氣分鬱增急疾乃瘳大風亦利第十三段妙音菩薩品亡母脫苦神人住空水不能漂尸不生臭虎吼退賊字化為金第十四段普門品火不能燒水不能漂二章脫羅剎難黑風吹其船舫刀段段壞二章枷鎖自脫二章賊不能害二章求男得男現身説法顯童女身顯比丘尼身第十五段陀羅尼品妙莊嚴王品普賢勸發品崇自出竇鬼乃扣頭閻王指送第四天菩薩來乘六牙象第十六段幼尼誦出真詮侍女冥通梵部舟人護涉天樂來迎深敬辨山人之精書堪歌崔牧伯之慶會光明出於口角菡萏生於舌根寶岩徒之或講或疑蓮華院之若讀若説珍禽顯瑞亡妹告徵誦舌長存燒經不改經無一字爪生五花第十七段誦舌長存燒經不改經無一字爪生五花跋法華靈驗傳目次終
