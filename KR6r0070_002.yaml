body:
  text: 湖州天下上座師本名抱玉吳興人也母梅氏孕協靈祥即惡薰穢既誕齔歲於尼總持法華寺出家願誦蓮經三月通貫日持七部年登二十詣京受戒時肅宗皇帝夜夢吳僧誦法華經口出五色光吳音清亮洎翌旦勑京城僧能誦法華者二百餘人並入禁中帝視之皆非所夢者其時抱玉方入關閉令問其遠來之意答云善誦蓮經特來受戒也令奏帝即降旨召見帝曰朕所夢者音容宛若遂令上殿賜座誦經至隨喜功德品口角放五色光帝大悅曰朕夢中所覩之即此也經才訖賜七寶湯令別築香壇專為受戒賜名大光封天下上座勑居千福寺玉梵音遍滿常通帝聽又別居藍田精舍寺僧夢天童來降告言大光經聲通于有頂非聊爾人也時衆咸謂師即梁朝尼總持後身後乞歸吳興時李伸刺于吳興醉於持經道場夜醒忽見白光滿室往覘光公宴坐持經光起面門經聲向息光亦隨斂李相索於空門寡信而篤敬於師親著文題曰墨詔持經大德神異文初師上表乞歸吳興帝賜墨詔一道第十段隨喜功德品法師功德品埋即生蓮舌常諷典窰瓦變作蓮華而警俗函經化為草束而拯生經一通而更不忘髮三剪而輒自長埋即生蓮紹興末明州奉化縣有姓趙人其母安人重佛齋戒誦法華經房下有一女使每竊聽久久忽記得四句所謂青蓮花香白蓮花香花樹香果樹香自此動靜施為常吟詠不絶人聞之謂為笑語殊不知此女亦有用心處一日作事乖主意陵遲至死遂以其尸潛瘞後園異時忽於其上秀出青蓮花一朵香色可愛餘人不知其由獨安人默而識之蓋所誦四句經感應之如是也安人復不匿其德密説與虗堂法師本空空每舉以化人宗曉嘗親聞其説聊記于此出現應録舌常諷典俗士楊難及雍州萬年縣人也幼而耿介年將知命方祈妙典聞法誠法師有道遂師事焉誠乃授以法華數月之間悉得通利曉夜忘疲雖涉衆務其聲不輟於後無疾奄然而終終後焚燒髏舌獨存試收藏之石函置法華堂時加供養屢聞函內諷誦之聲振動石函詞句明了聞者敬悚知受持之力焉出弘贊第八窰瓦便作蓮花而警俗釋慧超丹陽建元人也作有遠量誦法華經以為恆業嘗遇法令嚴峻禁勒沙門超潛伏瓦窰綿歷多年後時難廓清拂衣而去告窰主曰貧道此中誦法華經已千餘遍可灑掃供養勿更用之其人不信乃修舊貫所燒之瓦遂變作蓮花之形周植四壁遠近見者咸歎異之又嘗在寺誦經有一猛獸來聽超兼為受戒略如家犬語曰檀越好去即依言而返感徹幽明難以具記後臥疾弟子流涕超曰長生不欣夕死不戚乃面西而坐奄然長往年七十有七即武德五十二月六日也有門人善思者亦誦法華萬有餘遍臨終之日幡花音樂紛聆空際在寺僧衆咸悉見聞又自見花臺迎之思乃端然拱立合掌而化遠近觀者如堵墻焉出弘贊第八函經化為草束而拯生儀鳳年汝州梁縣北村劉氏男從征東討高麗沒為奴於遼海東岸牧馬因而寢睡屢夢有一僧喚令入海共汝歸家若此非一劉氏子自惟漂落與死莫殊頻感斯夢遂投身海浦於水中抱得菊草一束隨波漂流浮渡海西至于岸上行餘一里思念此草能濟吾身命却回取草解束曝之乃於其中得法華經第六卷遂持還其父劉老先緣子沒蕃遂為造法華經一部書寫清淨每事嚴潔及見子到相持悲慶怪問所由子具説前事父子遂共於精舍中開視經函乃欠第六一卷驗其子海中得者果是其父為子所造之經紙墨僉同宛然符會出弘贊第十經一通而更不忘清信士謝智藏雍州藍田人也雖處田家恆持五戒因緣暫至縣下見寺中有沙門講法華經至第六卷持經眼耳鼻舌身意功德乃即發心歸家誦持第一卷除人事外不曾休息其人心願更進餘卷既遠居田無人教授思遇明師經於數年忽見一波羅門僧來扣門謂藏曰汝有食不乞我一齋智藏欣然隨家所有如法供設僧既食畢謂智藏曰汝欲得受法華經者可將本經來智藏歡喜深適所願即授其經一從聞受更不忘失受經既了僧忽不現智藏情甚惆悵不識神人自師去後但聞異香數日不絶出弘贊第八髮三剪而輒自長釋弘照年二十出家即誦法華數月便度卜宅終南誓誦千遍頻感具祇潛來翼衛又逢深雪麵唯一斗許二十餘日食之不盡乃與友人履信及一居士移往寒山並結草庵更修前業忽一蛇長百尺斑文五色頭高丈餘直來庵所低身俯聽照初驚惶戰栗不敢視之起大悲心發深重願合掌流泪抗聲終部蛇少選而退自爾頻來不息照雖頗知無害然惡其腥臭懼其形狀令居士驅之其乃以繩纏頸引致深叢繫於大樹至夜照信及居士同夢一女人掩泪泣而前曰弟子是此山神女性樂聞法數以穢形干突法衆今被驅繫辭師遠去不復聞誦大乘以此為恨照等各自驚覺遽相徵問所夢既同疑其致死即執炬往看果有斯事居士呼泣投地披誠懺謝就其尸所共為誦經又欲設千僧齋乃於庵側獲銀數餅下山饌會恰然周足嘗行至一村有貧女劉氏請留供養照愍之而止於七日中罄其所有照便欲去信女啓勸復留更無資貨遂剪頭髮以買齋食更經七日照復欲去貧女悲泣固留因復停止女賣髮之直用之已盡憂恨通宵莫知出處忽以手摩頭覺髮生如故驚喜踊躍即便更剪復經七日還長如前凡經三剪照以淹留留久執持衣鉢決不肯住女乃頂禮具陳云師自有料照等聞此噎不得言悼嘖微軀當斯厚意照於永淳中忽無疾終於甘泉寺四輩聚火燒之唯舌不然紅赤如本時慶喜寺寺主戒因等行頗流俗類不信有之乃與合寺僧徒士俗五百柴炭數車更燒十遍形色儼然方皆悔伏其舌盛以香函流傳供養出弘贊第八第十一段常不輕品如來神力品囑纍品芝生墓側蓮出舌根舍利流出於金文光明照耀於寶塔瓶水冬溫夏冷天兵匝地盈空芝生墓側清信士韋仲圭臨卭人也天性孝弟武德中父遘病仲圭勤於孝養父之卒也捨遣妻妾廬於墓左尤信佛教誦法華經晝則負土成墳夜則誦經精勤不倦常有猛獸夜至廬前蹲踞聽經久而不去仲圭正念曰不願猛獸之相逼也獸即起去明旦見繞墓生芝草七十三莖當墳前者行列次第如人種植皆朱莖紫蓋蓋徑五寸光色異常鄰里以告州縣時爭君昌為刺史説裕為別駕共至墓所嗟歎採芝草對奏詔表門閭後不知所終出弘贊第八蓮出舌根釋智業俗姓楊氏住楊州長樂寺精勤戒業誦法華經隋大業末年宇文化及在楊州作逆殺煬帝於宮闈于時天下崩離百姓飢饉斗米萬錢智業時在別院居一小屋專誦不輟遂餓死房中無人收葬此屋因復傾倒業尸骸竟在其下及義寧初平定之後其處忽生一莖蓮花光色異常道俗驚嗟莫知其故時寺僧有耆舊者乃語曰此地會有一僧專誦法華于時既屬喪亂於茲捨命無人埋殯骸骨在此必是僧之靈也乃尋掘花根其青蓮花乃從髑髏中舌根下生舌如生存都不爛壞寺衆乃將舌及花上堂鳴鍾集衆為轉法華其舌聞經猶能振動道俗聞之觀者如堵莫不嗟歎咸發勝心出弘贊第七舍利流出於金文釋智儼同州人也年至十三忽遇梵僧出家住戒業寺遍學法華維摩般若等並窮其了義遂當法匠實所謂高潔法師言行兼至者也顯慶三年太州仙掌縣道俗請儼於靈仙寺講法華經儼於寺僧還香房居止閣舍初夜取法華經舒披案上方欲尋讀于時還香并侍者三人並在其處儼焚香未訖忽見經上佛字中出三舍利五色光明散滿經上流行不住還香等遍告寺僧俱來禮拜欲共收取舍利舍利還流入於佛字僧等禮拜悲泣然香發願更覩真容舍利還從佛字中出流行不住少選之間別於他佛字中相從隱沒儼講法華凡數十餘遍感靈獲瑞難以具言將終數日處處巡行法朋舊識人人共別忽一旦灑掃庭院端坐入定於是而終忽有異香氛氳滿院經餘七日亡後數年其舌不壞鬢髮加長二寸顏色如舊識者以為得道之流也出弘贊第三光明照耀於寶塔左僕射宋國公蕭瑀字時文高祖梁武帝父明帝公深信釋典時處會宴每勑別賜素食公雖參國務而誦念無虧手著法華義記凡十卷時於第四為子姪講之疏成之日夢多寶佛塔炳耀空中因召名工造茲妙塔出弘贊第三瓶水冬溫夏冷長干寺東闍梨誦法華經甚有節行每有所誦瓶水冬溫夏冷略為常候出弘贊第七天兵匝地盈空釋玄秀少出家住黃州隨化寺常誦法華每感徵異時屬炎暑同友逐涼遣召秀來欲有談笑既至房前但見羽衛嚴肅人馬偉大怖而返告同往共觀如初不異轉至後門其徒彌盛上望空中填塞無際多乘象馬類雜鬼神乃知其感通也置而遂却明晨慚謝朋徒遂絶秀專斯業隋末終寺出弘贊第七第十二段藥王菩薩本事品自識前身難通二字檀香遠達佛手親摩藥精入懷池水療病癩瘡即愈氣力鬱增急疾乃瘳大風亦利自識前身隋開皇中魏州刺史崔彥武受職行郡至一邑忽謂從者曰吾昔在此邑中為人婦今知舊住處因乘馬循巷屈曲至一家命扣門主人老翁開門請入武升堂而坐老翁曰官人何事至此武即言吾前身是汝之妻老翁曰憑何為驗武曰吾昔誦法華經并金叉五隻藏東壁中去地六七尺其隆高處是也其經第七卷後一紙火燒失去文字吾今誦此經其後恆忘失也令人穿壁高處果然得經火損後紙并獲金叉一如其言主人泣曰亡妻在日常誦此經金叉亦其所有彥武又曰庭前槐樹吾昔産時解頭髮置樹空中令人探之果得其髮主人見已悲喜交集武即留衣物賜之而去出靈瑞集弘贊傳現應録難通二字釋某失其名住秦郡東寺有沙彌誦法華經甚通利唯到藥草喻品靉靆二字隨教隨忘如是至千師苦嘖之曰汝法華一部熟利如此豈不能作意憶此二字耶師夜夢見一僧謂之曰汝不應嘖此沙彌前生在寺側東村受優婆夷身本誦法華一部但其家法華當時藥草喻品白魚食去靉靆二字于時經本無此二字為其今生新受習未成耳其姓名某經亦現在脫不信者可往驗之師明旦就彼村訪問此家言畢問主人云有何經書答云有法華經一部索取看藥草喻品果缺二字訪云是太兒亡婦生存受持之計亡已得一十七年果與此沙彌年時胎月相應也沙彌後不知所終出弘贊第六檀香遠達師諱灌頂吳越王諡號總持生於章安吳氏三歲時便能隨母稱三寶名稟承天台定慧之法晚至稱心精舍長講法華化流囂俗時有法龍村人去山三十里染患將絶其子奔來求救師為轉法華經焚栴檀香病者遙聞香氣即愈出弘贊第三及現應録佛手親摩宋朝羅璵妻費氏寧州人也費信敬三寶誦法華經數年之間勤苦不懈俄而染患心痛浸成極熱闔門惶懼費作念言我誦經勤苦必有善祐終不因此至死地也既而睡臥即夜佛身舒手過窗以摩其心內外皆都金光滿室又聞異香襲入自此病愈見者莫不生信出弘贊第六及現應録藥精入懷釋淨見不知何許人也童稚出家多住崇高及龍門山誦法華經一萬三千部既誦持積久身力疲困過二十餘年後忽聞住處北邊有諸小兒言語閙亂轉覺煩悶亦不測小兒從何所來有一白頭老翁著白練裙襦每參問云禪師四大何如師答漸覺羸頓又不知何處得多許小兒日相煩亂不復可忍老公云師往其戲處坐待彼脫衣入水洗浴師隨抱一小兒衣還若來取者慎勿與之其若罵師師慎勿應答弟子自來語之見隨老公語往俟之諸小兒果脫衣入池洗浴乃抱小兒衣還房小兒尋後索衣見憶老公言囑永不還之小兒即惡口毀謗禪師及宗祖師亦不應白頭老公尋至語小兒云汝入師懷裏小兒初不肯從老公驅逼數回始入見懷沒在腹內老公問師四大何如見云氣力勝於從來老公尋去自爾已後氣力休強誦數倍識者云此當是普賢菩薩令山神驅諸藥之精變為小兒使其服之除疾病耳見後不知所終出弘贊第六池水療病釋僧明住濠州石門山於山頂石山纍甎造彌勒天宮一所并彌勒像常誦法華經每聞空中彈指及稱善哉聲至天監年中奏啓梁武請欲焚身頻煩再三方蒙聞許乃於彌勒宮前方石上遂其先志身並灰燼唯餘一甲燒訖其氏方四五尺忽陷成池信宿花生鮮榮絶代諸飲池者疾病皆愈後人造一小像重燒此甲以灰塗之人或玷汙像即移去其行道之處皆悉生花大如梨棗數過千百現有表塔具旌其事出弘贊第五癩瘡即愈唐絳州孤山陷泉寺有法轍禪師山行見一癩人在土穴中從師乞食師憫之引歸寺中仍鑿土穴安之授與衣食教誦法華經其人素不識字加又凡鄙師句句授之終不辭倦誦之將半忽夢一僧指教自後漸覺聰慧及五六卷身瘡漸安一部通利四大專蘇佛言病之良藥斯言驗矣出靈瑞集弘贊第八及現應録氣力鬱增釋僧歡出家住金陵治城寺本羸病乏氣力乃志心於寺塔下懺悔祈請懇到誦法華經不輟於小時間然旋力寺塔前有兩石獅子形甚重大歡忽以兩臂各貫獅子腹下擎之而走行十許里都不覺倦出弘贊第六急疾乃瘳趙仠受性貞固不幸遭急發之疾雖種種治無一驗效遂秉志誦蓮經厥疾頓愈仠自是常誦不怠乃與陰陽僧日資演源并緇素若干人結法華徒同修佛慧大風亦利釋亡名不知何許人也不幸遭黑癩萬方無效忽聞法華是閻浮提人病之良藥誓志全誦厥疾乃瘳又有南臺録事劉氏亦感此疾雖種種治無驗一日亡名路逢劉氏曰我亦曾得此病賴誦蓮經即得除愈劉氏於是生決定信即覔蓮經手不釋卷一部乃畢忽夢有異僧以手摩挲身已即以艾炷渾身灸之驚駭即覺白汗如流身心豁然如雲霧撥平復如舊第十三段妙音菩薩品亡母脫苦神人住空水不能漂尸不生臭虎吼退賊字化為金亡母脫苦長安通輒坊劉公信妻陳氏之母因病先卒後陳氏暴亡見一人引入地獄備覩諸罪相後見一獄石門忽開母在其中受極重苦母見女曰汝可為吾寫法華經一部使吾脫免言已門閉陳氏再蘇説之公信即憑妹壻趙師子寫是經忽有經生持新寫蓮經一部來貿錢趙言幸有此經可贖之不必寫也劉從之授與陳氏陳氏一日設母食乃夢母曰吾先令汝寫經一部何不為之女曰已為贖一部訖母曰吾為此經增受重罪獄卒打吾脊破以不合取范家經為己有故女夢覺急請人書之經成又夢母報曰吾承經力已脫冥司好處安身今來報汝汝當信心好住世間及詢前經果是姓范人寫唐龍朔中也出法苑珠林傳釋道世撰也有一百卷入藏本神人住空釋玄真壽春人也居永福寺誦法華經無時懈息時於秋天月夜持誦此經至第七卷方半比房有一沙門忽起如廁乃見庭中有大人形影因舉頭四望即觀空中有一神人嶷然而住此沙門因立足瞻仰更不移步久之經文亦了神忽不現其僧從此始學誦持終身不懈出弘贊第八水不能漂唐武德中蘇長授巴州刺史帶家族赴官因渡嘉陵江中流風作船帆傾沒男女六十餘人一時喪失唯一女使常讀法華經浪入船中女乃頭戴經函誓與俱沒既而女即不沉隨波泛泛頃刻至岸捧函而上開視其經了無霑濕此女後嫁於楊州某篤信讀誦愈於舊也出法苑珠林傳又出弘贊第九及現應録尸不生臭道士史崇長安郊南人也小屬道流早預黃巾住玄都觀後忽發心誦法華經日恆一遍私立佛像六時禮懺每為諸道所嫉因茲返俗彌精諷誦後忽染患身亡時在盛夏一無變壞唯聞香氣親里敬之鑿龕安堵側時時常聞妙香後經年餘筋肉都盡唯舌形顏色與常人不異或有疑駭之者乃火燒不變斧斫無損遠近見聞信倍恆百出弘贊第八虎吼退賊釋法愛長沙人也誦法華經因緣往交趾值交人反亂愛隨例藏避忽為五賊所得置在一處口云待我食竟殺却道人愛乃見壁邊有一槊子挾將出外向北直走賊食竟起遙以見愛奔馳競往愛到一棘林即投中隱避乃遇兩虎相抱而臥虎見愛來並舉頭看愛愛轉惶懼口云二檀越貧道被賊逐急投檀越願將接救護二虎即出外奮迅驚吼賊便退散愛又北走虎隨送之到一水邊見人持數片飲食授與愛愛而食之氣味甚美即便渡水上洲虎亦捨去仍宿洲上又遇二人亦同在宿大設異味至曉方別仍又囑云但北向行自當得脫於是北出三十餘里乃逢舊知相見歡喜始得免脫愛後向道俗説之不知所終出弘贊第七字化為金張萬福貞觀中為洛州刺史其人性粗獷不甚敬信初至任所問訪左右管內有何德行衆僧左右報云廓下有一尼名妙智甚精進又造一部法華經如法受持供養緣此譽滿鄉閭萬福試使人索經來看尼聞刺史索經拒而不與為使君不護淨又未齋潔萬福大嗔更使人往尼不敢留即付經去萬福得經竟不洗手即取經開卷中並黃紙遂無一字萬福大怒曰此妖老嫗何由可耐即命左右追取尼來使往語尼曰師經上並無一字使君大嗔令追師來尼甚憂懼莫知所由汗流浹體隨使往至刺史牙門入屏墻尼見一雙金剛手擎杵棒如似授尼尼遂心安即入至刺史前其經文並在空中化作金字刺史見尼至并見金剛及金字在虗空中因即驚懼走起下廳號咷悲泣謝罪懺悔禮拜遂即回心信向發願造法華經一千部通十方供養仍自受持不敢懈怠自刺史歸向之後人皆以法華為業萬福乃問造經由緒尼曰欲造經之時於山中先種穀樹每用香水溉灌令得滋長樹成之後以香水和泥造作紙屋乃採取穀皮雇匠如法香水清淨造紙募訪能護淨之人後有一江南人士年可二十四五應募為書其書經屋還以香水和泥清淨造屋書生著新淨衣未寫經前預四十九日護清淨齋然後始書每出訖改易衣服洗浴畢然後始就書書時尼手執香爐胡跪經前供養書生如是不闕經了莊嚴成就乃作僧尼男女四色人衣各十通每來借經預令七日護淨兼與新衣著然後始付經如是恭敬永不虧闕出弘贊第十第十四段普門品火不能燒沙門法智為白衣時獨行大澤猛火四面一時俱起自知必死乃合面於地至心稱觀音怪火不至舉頭看之一澤之草纖微皆燼唯所伏地火不燒耳因此感悟捨俗出家出晉朝謝敷觀音傳水不能漂中書令岑文本江陵人也少懷正信常誦法華普門品過吳松江中流風作人船俱沒文本浮在水面聞人語曰但念佛誦經必不死也如是者三自此隨波達于址岸後於江陵設齋僧徒並集有一僧獨後去謂文本曰天下方亂君幸不遇害當逢大平致富貴也言已而去文本忽一時食梡中得舍利土顆獲大平富貴皆如僧言出靈瑞集及現應録又海濫縣有人落水同伴皆沉此人稱觀音遇得一石困倦如眠船見兩人乘船喚入開眼果見有人船送達岸已遂不見之出謝敷傳脫羅剎難外國百餘人從師子國向扶南忽遇惡風墮鬼國鬼便欲食一船人衆怖稱觀音其中有一小乘沙門不信不稱鬼便索之心怖稱名亦免出謝敷觀音傳黑風吹其船舫新羅時有女名寶開居王京隅金坊有一子名長春隨商舶泛海而去過期不知所之朝夕思念至於憔悴幸聞普門示顯神通之力假使黑風吹其船舫漂墮羅剎鬼國稱其名故即得解脫便生深信就敏藏寺觀音像前約一七日精勤祈禱至七日忽感長春執母手驚喜哭泣寺僧怪問所由春曰離家泛海忽值惡風同船之人皆葬魚腹余獨乘一板至於吳吳人收之奴使之耕於野田忽有異僧來謂曰憶汝國乎余即跪曰有老母在戀慕無極僧曰若欲見母隨我而來言訖東行余隨之有一渠僧乃執手超之昏昏如夢忽聞母語到此敏藏寺像前雖審知我母猶疑夢中矣即天寶四年乙酉四月八日申時離吳戌時到此堂中景德王聞而敬重優頒信賄永充供養每於月生八日幸寺禮讚永為定式寶開與長春約結鄰里清信士女特成金字蓮經一部每至春三月為立道場敷宣妙理精修禮敬仰賽玄恩出敏藏寺記又見雞林古記及略傳弘録刀段段壞晉太中彭城有一人被枉為賊其人本曾供養金像帶在髻中後伏法刀下聞金聲刀三斫頸終無異解看像有三痕由是免罪出謝敷觀音傳又有高簡犯法臨刑一心歸命下刀刀折絞之寸斷遂賣妻子及以自身起五層塔枷鎖自脫晉有張暢為譙王長史王與暢因事繫廷尉暢夙有正信便即發心誦法華普門品一千遍以求脫免念言之至枷鎖尋即斷壞二人俱得出晉謝敷觀音傳及現應録又蓋護山陽人繫獄應死三日三夜稱名無間眼見觀音放光照之鎖脫門開尋光而去行二十里光明方息出處同上賊不能害晉隆安中僧慧達於山北隴掘甘草時羌人飢荒捕人而食達為所獲置之構中擇肥者先食達懼甚一心稱觀音名誦普門品食人取盡唯達與小兒在命只一日耳達持念不捨至旦忽一虎自草中跳出咆吼震山諸羌畏走虎乃嚙構而去達與小兒奔走得免出天台別行疏又尚書徐義秦末兵革蜂起賊獲徐義將欲殺之乃埋兩足編髮於樹夜中至心專念觀音有頃得眠夢人謂曰今事極矣何暇眠乎義便驚起見守衛人並疲而睡義乃奮動手髮既解足亦得脫行百餘步隱草叢中便聞賊追火炬星陳竟無見者天明賊散遂免之出謝敷傳求男得男晉時益州孫道德年過五十未有子息有僧令其至心稱誦觀世音經其即依之少日之中而自得夢婦即有孕遂生男也出謝敷傳現身説法唐大和中文宗嗜蛤蜊沿海官吏先時遞進人亦勞止一日䘖饌中有擘不張者帝以其異即焚香禱之俄變為菩薩形梵相具足即貯以金粟檀香合覆以美彩賜興善寺令衆僧瞻禮因問群臣斯何祥也或言大一山有惟政禪師深明佛法博問強識帝即令召至問其事師曰臣聞物無虗應此乃啓陛下之信心耳故契經云應以此身得度者即現此身而為説法帝曰菩薩身已現且未聞説法師曰陛下覩此為常非常耶信非信耶帝曰希奇之事朕深信焉師曰陛下已聞説法了時皇情悅豫得未曾有詔天下寺院各立觀音像以答殊俗私云菩薩以身為舌而説文宗以心為耳而聽顯童女身馬郎婦不知出處大唐隆盛佛教而陝右俗習騎射篾聞三寶之名婦憫其愚乃之其所人見少女風韻單子欲乞為養女曰我無父母亦欲有歸然不好世財但聰明賢善人能誦佛經則願事之男子衆皆聚觀女即授與普門品若能一夕通此則歸之至翌日誦徹者二十餘輩女曰女子一身家世貞潔無以一體事多人也可更別誦因授以金剛般若至旦背者十數女更授與法華經七軸約三日通之至期獨馬氏子能徹女曰君既能過衆人可白父母具媒娉送禮然後成姻乃馬氏以禮迎之女將至門且白適以應接體小少不佳願求別室俟安與君相見因頓止他房筵客未散而女命終而壞爛乃卜葬之未數日有僧紫伽梨姿貌古野來尋女子馬氏引之葬所僧即以錫杖撥開沙土見尸已化唯金鎖骨存焉僧取就河浴洗挑於錫上謂衆曰此聖者憫汝等不信正法方便諭化當思善因免墮苦海忽然凌空而去衆見悲泣瞻禮不已自爾一境奉佛誦經由女之力也山谷道人觀音讚云若欲真見觀世音金沙灘頭馬郎婦平江萬壽體禪師頌曰十分美貌誰家女百倍聰明是馬郎堪笑金沙灘畔約始終姻婭不成雙顯比丘尼身新羅憬興國師住京師三郎寺病久不瘳有一尼請看門人引視之尼曰師雖悟大法合四大為身豈能無病病有四種從四大生一曰身病風黃痰熱為主二曰心病顛狂昏亂為主三曰客病刀杖所傷動作過勞為主四曰俱有病飢渴寒暑苦樂憂喜為主其餘品類展轉相因一大不調百病俱起今師之病非藥石所療若觀戲謔事則理矣於是作十一樣面而舞之師視詭譎之態頗歡悅不知病之去也尼出師使迹之入南花寺佛殿而隱其所持竹杖在十一面觀音像前出海東高僧傳第五第十五段陀羅尼品妙莊嚴王品普賢勸發品崇自出竇鬼乃扣頭閻王指送第四天菩薩來乘六牙象崇自出竇宋建初中有僧普明少出家性純素常蔬食布衣以法華為日課誦時有別衣別座未嘗混雜每誦至勸發品即見普賢乘象前立鄉人王道真妻病革請師持呪方入門病者悶絶忽見一物如狸長數尺從狗竇出其病即愈又嘗行水旁有巫者云神明見明法師悉皆奔走出弘贊第六及現應録鬼乃扣頭寶通梵行精修長誦法華陀羅尼品稍有靈異時楊橋村有趙氏家妻為神所魅請通持呪通既至神即現形通告曰神在村中合當興福如何反魅於人神曰非弟子事此乃部下小鬼耳遂呼小鬼至前嘖罰趙妻因此得差續後趙妻之病仍發歌吟竟日又來告通通又至見所責鬼在病床前通曰前曾誡治那得再來汝若不去吾當誦呪令汝頭破作七分如阿梨樹枝也鬼乃扣首求哀不煩呪也從此病差鬼不復至矣出靈瑞集及弘贊第七現應録隋開皇年中事閻王指送第四天釋道璡荊州人也諷誦茲典布衣一食殆有遇人之量止辨才寺忽體仆息微經數日自見冥官追録將至王前王曰師誦法華律行清淨應生第四天中慈尊衆所弟子罪惡之身恐不復相遇故欲見師願垂救也璡遂暫蘇向諸僧具説言訖而卒出弘贊第八菩薩來乘六牙象高麗時有僧失其名在靈岩寺東林誦法華經每精誠懇到中表潔淨焚香禮佛以求證驗初有大蛇及雉鹿俱來立聽誦訖乃散中時山神將食自來供養後忽見光明從東山而下有大菩薩乘六牙白象大衆圍繞直至其前僧望光拜慶悅深至疑義闕文皆為敷釋餘衆但聞異香經久方隱出弘贊第七第十六段幼尼誦出真詮侍女冥通梵部舟人護涉天樂來迎深敬辨山人之精書堪歌崔牧伯之慶會光明出於口角菡萏生於舌根寶岩徒之或講或疑蓮華院之若讀若説珍禽現瑞亡妹告徵誦舌長存燒經不改經無一字爪生五花幼尼誦出真詮梁大學博士江泌女少而出家名僧法年八九歲有時靜坐閉目誦出一卷法華經楊州道俗咸稱神授費長房云驗於經論斯理皎然是宿習來非開神授即是次生事憶而不忘其神功乎出弘贊第二侍女冥通梵部左肅機崔義起有一突厥侍女素不識文於麟德中病死經夜見一梵僧突厥求哀僧以錫扣其頂教誦法華經一部言作梵音比晚乃蘇自陳其事家人不信告義起起試之突厥便誦經如流即請西域梵僧來聽侍女所誦之經自首至尾言音通正一字不遺時以奏聞上云冥道如此豈得不信當時朝臣無不知者出弘贊第八舟人護涉僧智聰住楊州白馬寺尋渡江住安樂寺值隋國崩思歸無計隱江荻中誦法華經七日不飢恆有四虎馴繞忽見一老翁腋下挾小舟來曰師欲渡江即上船其四虎見而淚出聰曰持危難正在今日即同四虎利涉南岸船及老人忽然不現聰領四虎止西霞塔西經行禪誦安衆八十餘人若有凶事虎來大吼由此驚覺至貞觀中年九十九於佛降生日熏爐遍禮聖像還歸靜室端坐而化續高僧傳出弘贊第八及現應録天樂來迎釋智友蔣州人住普雲寺誦法華經略無棄日每誦經之時必執爐閇目香煙不絶凡經四十二年前後總計將五萬遍所用澡瓶居常溢滿貞觀八年無疾坐卒將終之日有天樂來迎於房戶空中繁會良久又有香氣惹空充塞院宇久之而滅弟子及道俗千有餘人迂于東南坐尸樹下經宿就視莫知所在出弘贊第八深敬辨山人之精書山人洪辨淳昌趙氏子出家于曹溪中高科往入巨滲山菴精進持戒一字一拜書法華經一部極盡莊嚴朝夕禮拜供養適有倭國僧來見懇求之乃付囑流通其僧頂戴賫歸本國船中放光到已安崇福寺道場中衆僧禮敬感得舍利後一年道人法行隨使舸入彼國親見而來即中統元年庚申也出海東傳弘録堪歌崔牧伯慶會少卿崔將赴官羅州使宋人楊赫推命曰宜精設大會供養大乘則必當遠到公及下車請圓妙結夏安居于雲谷寺及指揮使行色近境公入官時小婢忽得顛狂種種對治婢即語曰我非顛狂我是乳母之夫某也物故許多年冥遊未得超升今幸竭誠張皇梵席欲問一二大旨然守護神將呵禁不入倣徨門外數日矣非但某耳先亡親屬某與某亦欲聞法隨我來耳然飢渴害志請先酬酌又令吾輩至雲谷寺呼名許入於道場冀得度脫公聞之怪甚送客已到寺一一如其呼名設席使之聞法公自是常讀蓮經翌年秋召為右承宣不數年拜相至門下平章事立極人品而卒出海東傳弘録光明出於口角僧亡名寓尚州小寺常以陰陽占卜出入里閭男女皆迎之問禍福以此資衣食一日官廳設法廗州內諸寺典香者咸會焉亡名雖預只是陰陽僧居衆末皆忽之如草比及夜半燈燭已息昏昏假寐中忽見光明如燈火衆皆驚起試尋之乃從亡名口中出也因委問其由答曰豫扶身術數反愧黑業內自懺悔但誦課蓮經有年矣諸僧皆歎伏修敬焉出海東傳弘録菡萏生於舌根尚州戶長金義鈞常樂讀法華經募勸耆老少壯道俗分為二徒每月六齋日召耆老于私弟習誦蓮華經經畢略以茶果慰之及集少壯則并置酒侑之自此少壯之發心不飲者壯入耆老徒時人戲曰某與某已入無酒法華徒某與某猶在有酒法華徒其隨機激發如此比及無常葬於山麓蓮華發於冢上出海東傳弘録寶岩徒之或講或疑松京宣祺門右臂有嶺連亘垂及保定門者曰德山山之乾維有一蘭若曰寶岩樓閣開豁坐見山川縹眇之外東北里致仕卿相若林樞密千表秦尚書世儀梁大卿棟材與諸退老并散逸四十餘人同結法華社每月六齋日各持科本蓮經差一人別座點破科端銷釋義理諸耆老證聽或設疑問如是次第輪環相續益欲人人之盡能解説也至十五日則精設妙饌供養彌陀合院設齋過夜精勤同回向淨土故至臨終之際如意自在者不絶焉出海東傳弘録蓮華院之若讀若説松京駱馳橋東巷有一招提曰蓮華院凡城南里清信士輩結法華社每月六齋日同會于此若讀若説其所以憑仗妙乘回向淨土者多與寶岩社相為甲乙珍禽顯瑞居士崔彪耽津人也聞圓妙結於寶月山與堂弟弘請創於萬德山各占構堂宇甚有力焉平生未嘗現嗔怒相其子往鄰邑忽為大蟲所害彪為辨紙墨請山人一如書法華經忽感青鳥來入經室貌甚間暇如是者至于再三洎經將畢夢亡子告曰因寫經力得為純善美丈夫身亡妹告徵女右侍禁金軾之第二女也其弟道人之虗常誦蓮經女忽遘疾命終托之虗告曰請為我設法華勝筵用助超升時之虗住穴古寺得得來家即灑掃私弟約一七日請持經開士六時精進至罷席日金氏又現夢曰暫間經力得生勝處後虗到社委説如此第十七段誦舌長存秦州權氏女常誦法華死後十餘年其家改葬見其骨肉略盡唯舌如生出弘贊第八燒經不改貞觀五年隆州邑西縣令狐元軌信重佛法寫法華金剛涅槃等經恐致訛誤遂憑土坑禪師撿挍寫已即帶往岐州莊所一日他行其莊為外火延燒一時蕩盡元軌回嗟歎莫窮因令人撥灰取金銅軸頭忽見諸經完然黃色猶不改但金剛般若首題焦黑自言所因乃初寫時有官人能書其人行急不獲潔淨直爾立題由是被焚出弘贊第十及現應録經無一字唐武德中有尼法信通持法華經仍欲精寫一部遂訪書人倍酬其直別置堂戶令書之每一起一浴更著淨衣仍於案上壁鑿通外加一竹筒書生凡出息輒含竹筒吐息于外寫經七卷八年乃終設齋慶懺立淨道場香花崇奉至貞觀十三年有龍門寺僧法端常講是經以此尼經本精至遣人往請固辭不已而自送去及講法開讀唯見黃紙了無一字端慚懼即還之尼知有所犯即以香湯灌滌其函頂戴繞佛行道凡七晝夜及開視之還復如舊本出法苑珠林傳弘贊第十爪生五花尼高郵縣人志節霜淨言行氷清誦法華經不捨晝夜初誦一卷忽於右手爪上生一花狀如綾絲次至五卷五指爪上皆生一花誦徹六七掌併二花大過爪上由是聲傳闕下陳武皇勑入看之從此郡人呼為花手尼本出靈瑞集最乘之法非後學所能辨必考是法之驗然後而人信之自法華東譯以後諸家章疏蓋多而智者解釋獨行於世然流傳或失本真講演未達其奧一源之妙岐於萬派嘗謂讀是經者要看講儀與夫靈驗傳以其直探玄旨深求妙應斷在二書也妙慧謹捨資財刊此二書安置于萬義寺以壽不杇耳寺生至亢間貞古玄默相繼主席卒傳於余王文忠肅公之伯父珍丘大禪師混其其又傳於三藏法師義旋旋後三傳而至于余要皆不出乎吾宗爾寺本混其嘗設法華道場故宜於此宣揚此法用丐皇明嘉靖十三年甲午六月日全羅道高敞文殊寺重鋟
