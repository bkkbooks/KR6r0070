body:
  text: 法華靈驗傳有大唐藍谷沙門慧詳所撰弘贊傳十卷大宋朝四明沙門宗曉所撰現應録四卷又有本朝真淨國師所撰海東傳弘録四卷今歷覽此三傳抄録其中最為奇特事合成二卷以勸發後來兩卷合百七奇異觀識沙門釋了圓録園苡呈祥苡音以香草也法師鳩摩羅什此云童壽龜音丘茲國人七歲出家日誦千偈其母携至月支國見一羅漢曰此沙彌年至三十五當大弘佛教度無數人每唯其言一日謂曰方等深教應大闡真丹唯爾之力時符堅據關中太史奏云有德星現外國分野當有大智人入輔中國堅曰朕聞西域有羅什將非是耶即遣呂光率兵伐龜茲國光既獲什回至涼州聞符堅為姚萇所害乃據關外僭號後涼萇崩子興襲位廟庭俄生連理樹逍遙園蔥變為苡以為祥瑞遂伐呂光迎什入長安待以以國師之禮興於逍遙園引諸沙門聽什講説辨通華夏覽舊經與胡本乖誤以弘始八年於草堂寺與僧䂮音略利也等八百餘人更集四方義學沙門二千餘人對舊經考校譯此妙法蓮華經一部七卷什曰所譯法華等經幸共流布若所譯無謬願焚軀後舌不焦爛言訖而終至於闍維舌界不灰委見梁僧傳及南山感通傳韋天人曰什公聰明善解大乘彼自七佛已來傳譯得法王之遺寄也俗以陷戒為言此不須疑什位三賢非悠悠者也出弘贊第二卷及現應録上之一天花現瑞梁武帝潛龍時宅嘗七日七夜放光帝曰非我所居乃捨為寺名為光宅勑法雲法師為主雲師義興陽羡人也生時雲氣滿室因以為名七歲出家更名法雲雲年在息慈雅尚經術於妙法華研精纍思品酌義理始末昭覽垂名梁代者也嘗一寺講散此經忽感天華狀如飛雪滿空而下延于堂內升空不墜講訖方去有常供養僧學法雲師日夜發願望得慧解忽夢一僧云雲公燈明佛時已講此經那可卒敵也又夷陵縣漁人於網中得經一卷是泥洹四法品末題云宋元徽二年王寶勝造奉光宅寺法雲師以此勘之元徽二年雲公年始十歲寺無光宅此乃靈瑞預彰也妙字始成便生勝處隋開皇中有僧慧超立行卓爾常誦法華有一弟子年至志學病死齊去泰山不遠超往焚香具述來意木偶人忽發聲言師戒行精苦所問敢不咨白遂引至府君前超白曰弟子今在何處君曰在此未有生處超曰欲與相見得否君即使領東行數十步果得相見因問苦樂如何弟子曰但被拘繫亦無苦樂念生處未定願師升濟之師曰作何功德弟子乞造法華經一部設齋一百員師既歸即書經飯僧事訖復謁府君相接如先師陳所為君曰弟子師寫經題妙字始成便生勝處師曰生於何處君曰還生齊郡王武家為男子待三歲可往覔之超過三年即往問言檀越之子欲得相見王氏抵拒不言有子師具説府君之言其妻在室語夫曰法師靈感若此可使見之即抱兒子安限外兒一見師走入懷抱悲泣良久及年長大志願出家還事超師靈瑞集又出弘贊傳第十及現應録題目才寫已脫冥司隋釋行堅常修禪觀節操嚴甚因事經遊泰山日夕入嶽寺度霄藉蒿草於廡下端坐誦經可一更忽見其神衣冠甚偉向堅合掌堅問曰世傳泰山治鬼是否神曰弟子有之堅曰有兩同學僧已死今在否神問名字云一人已生人間一人在獄受對師往見之神遣使引入墻院見一人在火中呼號形變不可識而血肉焦臭堅不忍觀即還廡下復與神坐堅曰欲救是僧得否神曰可能為寫法華經必應得免堅去急報前願經寫裝畢賫而就廟神出如故以事告之神曰師為寫經題目彼已脫去今生人間然此處不潔不宜安經願師還送人寺中供養大宋高僧傳又出弘贊傳第十及現應録第一段序品唱題之頃地獄皆空買紙之時天堂已化國王布髮天帝賜金唱題之頃地獄皆空左監門校尉李山龍憑翊人也唐武德中暴亡過七日乃蘇云初被一使追至閻王殿前見囚徒數千王問龍曰汝作何福業答曰誦得法華經二卷王稱大善即命敷座請誦之龍唱妙法蓮華經序品第一王曰且止龍便下座顧諸囚徒皆乘空而去王稱誦經之力使聞者皆得解脫王即遣龍再生又勑使者引遊諸獄令見鐵城鑊湯等事使者曰汝今得脫皆經之力汝歸當設我食龍即許之既蘇乃見親屬經營殯具即遣備食於水邊忽見三人謝曰君不失信言已而隱出太平廣記買紙之時天堂已化洛州洛陽人河玄玲龍朔二年終於京師冥司遣為主簿麟德中玲鄉人死之冥道與玲相見玲問鄉人君何至此答曰被追至此玲云我見案主逗留君枉來也放君還去鄉人別玲將出乃見同村嫗謂鄉人曰君至此豈不觀我受苦處耶便見鑊湯湧沸烹煮罪人嫗曰君可語我夫為我造法華經一部脫蒙見許却後十日君可報我於村南水頭鄉人既蘇乃即喚其夫令為寫經其夫急與買紙付人令寫鄉人至前期日往到水邊乃別見他嫗謂鄉人曰君是前所囑寫經者乎鄉人曰是也嫗曰前者婦人夫為買紙之日已往生天所以不獲赴期與君今日相見故留言囑令我報君言畢遂不獲見也出弘贊第十國王布髮大智度論云昔天竺國有一阿蘭若比丘名摩訶羅其國王嘗布髮掩泥令比丘蹈過又有比丘來白王言此人不多讀經何以大供養王言我曾一日夜半欲見此比丘即往其所見此比丘在窟中讀法華經有一金色光明人乘白象王合掌供養我方親近彼即滅沒我問大德以我來故金色光明人滅何耶比丘言此言遍吉菩薩遍吉自言若有人誦法華經我當乘白象來教導之我讀是經遍吉自來矣遍吉即法華經中普賢菩薩也我聞是已禮足而退是故我今常當供養出弘贊第九及現應録第一卷天帝賜金清信士陰明觀丹陽小鄒村人也少年曾經出家無他行業誦法華經一部後遂還俗兼有妻子家業農功或被宮驅役或居家力作生業甚貧衣食不繼口恆誦經不曾暫息除寢食祇承官私人事之外皆不棄日在後忽於夜中聞空中有人喚陰明觀陰明觀喚甚分明觀起應諾空中人又曰汝起我與汝金寶寶在村南田東頭大黃蓮樹下汝可往取觀懷欣即起呼其子持火及鍬钁共往田中子見父將往猶懷疑恨曰那得忽爾夜中取金阿翁狂顛父固跋去及至樹下掘鑿了不見金兒又諫父須臾之頃聞空中聲曰可更近前依言而取果有所獲因此生業用展無復貧寒之弊村鄉怪其引用異常疑有他故觀乃具向父老説之彌勤誦習出弘贊第八第二段法説周方便品亡婦生天神人指路蓮開臘月佛記天宮亡婦生天陳法藏雍州萬年縣霸曲人也身為供膳貞觀十八年洛州上番去後妻亡下番回首離本住村可十餘里路逢亡妻妻云我今已死經於數日須臾之間藏忽見八九家如貧人宅藏坐一間偏次屋少時其妻被喚將去藏隨後者見妻被牛頭獄卒鐵叉貫之內钁湯中骨肉分散叉出還活如是七返訖放來相見形容頓惡語藏云與君為後妻前婦自死非妾所害君𮖪內有五百錢家中有牛可直千五百至家𧫎阿婆努力為妾寫法華經妾即得離此苦將妾此語𧫎請阿婆藏歸啓母賣牛恰得千五百即喚經生買紙藏因行更尋妻住處藏始扣門便聞比家遙報云君新婦昨買紙時已即生天其驚喜信奉增至所得財利每寫法華十九年向興善寺供養行道具向諸僧説出弘贊第十神人指路袁志通隴城縣人也誦法華經年二十點入軍差征八蠻去家萬里持誦不絶至南界軍敗多被損傷通恓惶不已忽有五人乘馬在前最後一人謂通曰汝修善果誦念經文余等善衆守護不能為害汝行七里許有一塔可入中隱蠻即還營矣又見二僧謂通曰檀越以讀誦力故適遣五人衛護汝當精進恆有善神匡贊言已乘空而去自爾凡經三陳不被寸鐵蠻平得歸貞觀八年抱疾命終見使者追至閻王殿前王問作何善行通曰常持法華齋戒禮懺王聞合掌稱歎告取金床玉几至殿安設氈褥請通上座誦經誦一卷而止王曰汝之德業甚深應更觀地獄令知罪福不差通見戰懼復詣王所王曰汝見地獄應更勤修是故我今乞汝長年也通蘇述之如上出靈瑞集現應録蓮開臘月釋法融俗性韋氏丹陽延陵新亭人也少小被緇去俗晦影山林學法華經負笈尋師不遠千里然率性無恆不為時輩所許後歸丹陽牛頭山幽栖寺別為小屋精修故業遠近學侶翕爾歸之乃於岩谷之前講法華經一部于時正在盛冬凝霜被木乃於講所忽生二莖金色蓮華衆甚驚異嘆未曾有又有一大鹿常依時聽講門人發心皆以法華為正業後不知所終出弘贊第三佛記天宮清信士陸淳吳人也誦法華經一部蔬食長齋大業二年五月染患甚篤經十餘日於後四日四夜仰臥看屋了不暫暖有知識睿師因來看疾問何所視耶答云佛記淳當生焰摩天今見彼天宮堂殿林木城闕諸天徒衆看之致樂不覺倦也過四日身亡出弘贊第七第三段比喻品信解品藥草喻品授記品經卷重而罪案輕時患痊而壽笇永夜明如晝時雨普霑爐香不熱而自熏瞽叟無目而能覩經卷重而罪案輕劉時雍州萬年縣平康坊人也永隆二年六月患經二日致死死經六日唯心上暖其家已擇殯日未敢襲斂至七日平旦忽然再蘇云當時被一人引入大城宮殿樓觀壯麗異常見閻羅王云汝可具録生時功德遂答生時唯讀法華經兩卷更別無功德王遂索罪案及業稱稱之法華兩卷乃重於罪案王撿案云其人合得九十年活謂案典曰可放他還因令得活遂受戒不飲酒食肉造金字法華永充供養出弘贊第九時患痊而壽笇永釋慧峙始興人也少而道素誦法華經凡三千餘遍年二十三忽染時患經涉數旬乃夢有人將峙到一所墻院赤白一如官舍入門即見貴人形長八九尺身著絳紺袍戴烏紗帽云是閻羅王王問師作何德業峙答云少來誦法華經王云可誦峙即升一高座面西誦法華經第二卷到譬喻品中譬如長者有一大宅便住王即起云法師還去命二人送因即醒悟疾亦輕損數日平復即能讀誦又年五十五時身又染患忽夢在始興果心寺浮圖上立有人推下云乞汝八十餘年命因即痊愈到大業十三年年八十二歲後不知所終出弘贊第七夜明如晝有辛老者失其名年八十餘住鄭州市南角常讀法華經專心清潔自三十年來每夜讀經夜明如晝不可燈燭若捨經卷還暗如常不復見物出弘贊第九時雨普霑釋慧遠俗性朴氏京兆人也年甫十歲投吉藏法師而出家焉具戒已後博聞多識講法華經晚辭人境卜居藍谷乘間樂道貞觀十九年在寺夏坐時屬亢旱乃講法華以祈甘液遠近聽之雲集霧隨每有二老應時而至既非舊識遠點記之潛思詰問未之發也既講至藥草喻品大雨霑洽向之二老三日不來後䇿杖俱臻遠怪呼而問乃逡巡對曰弟子龍也比蒙法師弘譬喻之品開方便之門思酬德慧忽然降雨且時未應下感擅灑之故為龍王所笞耳因忽不現遠雅性謙揖雖遇沙彌必下騎而存問也或問其故答曰髣佛染衣仙聖幢相獅子致敬今成正覺在豫一介敢不遵乎遠常誦法華頻有靈感或不加油炷燈數日自明出弘贊第三爐香不熱而自熏釋智琰俗性朱氏吳郡人也祖獻梁散騎侍郎父珉陳奉朝請母張氏八歲出家事通玄寺璩法師為弟子隋煬帝在蕃深加禮異至大唐統宇還歸武丘山寺講念之餘常行法華普賢等懺又誦法華三千餘遍感應冥符神瑞非一宵爐未熱自起煙芬夕灌才空潛加溢水貞觀八年卒春秋七十一凡講法華三十餘遍出弘贊第三瞽叟無目而能覩清信士王梵行琅瑘臨沂人也少失兩眼其母慈念口授法華至年十三一部通利仍晝夜誦習憑心專到誦得一萬七千遍雖目無覩而行來不須前導自識坑坎能織席簟縫衣書疏勝有眼人人咸疑其別有所得年七十一開皇六年終尸陀草野鳥獸不敢近肉既消畫唯餘白骨舌方出口長一尺餘色如蓮華其弟慧義以磚函盛之久而不爛第四段因緣周化城喻品羽族慣聞而便脫業軀比丘暗誦而即離鬼難感悟前生之師弟通交二世之爺娘羽族慣聞而便脫業軀東晉時有僧法志結庵餘杭山誦法華經朝夕不懈有雉巢于庵之側每聞誦經聲則翔集于座旁若侍立聽受狀如是者七年一日憔悴師撫之曰汝雖羽族而能聽經苟脫業軀必生人道明旦遽殞即埋之及夜方假寐夢童子再拜曰我即雉也因聽師誦經今生于山前王氏家為男子右腋猶有雉毳可驗僧詰朝至其家問之果然王氏一日設齋志方踵門此子遽然曰我和尚來也舉衆異之携以示志志撫之曰此我雉兒耳遂解衣周視其腋下果有雉毳三莖至七歲宜聽出家父母唯之至時入山十六落髮以腋有毳命名曇翼授與蓮經不遺一字既為僧已隨方問道了悟宗乘得大辨才東遊會稽因至秦望山遂伐石誅茅為住山計專誦法華僅于一紀一日將曛有一女子身被彩服手携筠籠內有白豕一隻大蒜兩根立於師前泣而言曰妾山前某氏女入山採薇路逢猛虎奔遁至此日已夕草木陰翳豺狼縱橫歸無生理敢託一宿可乎師稱嫌疑堅却不從女子雨淚哀鳴師不得已讓以草床即蒙頂誦經至于三更號呼疾作稱腹疼痛顗師視之師投以藥女子痛益甚叫不絶聲曰倘得師為我案摩臍腹間庶得小安不然即死佛法以慈悲方便為本師忍坐觀不一引手見救耶師曰吾大戒僧摩挲女身此何理也懇求之切即以巾布褁錫杖頭遙以案摩斯須告云已瘳矣翌晨女出庭際以彩服化祥雲豕變白象蒜化雙蓮女子足躡蓮華跨象乘雲而謂曰我普賢菩薩也以汝不久當歸我衆特來相試觀汝心中如水中月不可汙染言訖縹眇而去爾時天上雨花地皆振動是日太守孟公顗方晨起忽見南方祥雲氤氳光射庭際而雲下隱有金石絲竹之音訪問得師普賢示化狀遂併師之道行聞于朝廷即奉勑建寺額號法華時晉安帝義熙十三年也出現應録及法華寺比丘暗誦而得離鬼難昔外國山寺有年少比丘每誦法華嘗於寺外經行遇羅剎女鬼變為婦人甚好姿首來嬈比丘比丘被惑遂與之通通後精神恍忽無所覺鬼負之飛行欲還本處規規將噉於夜前分從一伽藍上過比丘在鬼上聞伽藍中有誦法華經聲因即少惺憶己所習乃心暗誦之鬼便覺重漸漸近地遂不能勝棄之而去比丘少時醒窹聞有鍾聲尋聲到寺扣門求進具陳本末然計去其鄉已二千餘里諸僧云此人犯重不可同止有一上座云此鬼神所惑非是自心既脫免現經威力可留住寺令其懺悔後遇彼鄉信乃發遣之出弘贊第六感悟前生之師弟釋曇諦者其先康居人也後移吳興諦母黃氏晝眠夢見一僧呼黃為母寄一麈尾并鐵鏤書鎮黃既眠覺見二物具存私密異之因而懷孕生諦諦年五歲母以麈尾等弄示之諦曰秦王所餉母曰汝置何處答曰不憶至年十歲出家學不從師悟自天發後隨父之樊鄧遇見關中僧䂮道人忽然喚䂮䂮曰童子何以呼宿士名諦曰阿上本是諦沙彌汝曾為衆僧採菜被野豬所傷不覺失聲耳今何忘耶然僧䂮經為弘覺法師弟子為僧採菜被野豬所傷䂮初不憶此乃詣諦父諦父具説諦生本末并示書鎮麈尾等䂮乃悟而泣曰即䂮先師弘覺法師也而師經為秦主姚萇講法華貧道為都講姚萇餉師二物今遂在此耳追計弘覺捨命正是寄物之日復憶採菜之事彌增悲悼諦遊學內外過目則記講法華大品維摩各十五遍終於宋元嘉末年費長房曰弘覺法師弟子僧䂮師徒匠道名重二秦什物三衣亦復何限唯書鎮麈尾保惜在懷及移識托生此之二物遂得同往出弘贊第二本出高僧傳通交二世之爺娘新羅國有金果毅生一男子從少出家樂讀法華經至第二卷誤燒一字年十八忽從天喪邊生別處金果毅家又得出家即遍受讀法華經至第二卷每於一字隨問隨忘夢有人云小師前生向某鄉某金果毅家生亦得出家在彼生時讀誦法華誤燒一字是以今生隨得隨忘彼舊經現存往彼自看此小師依夢向彼尋覔果得其家借問投宿前生父母依俙欲識尋訪舊經乃見第二實燒一字小師及前父母悲喜交并二家遂為親好彼此無二當即言及州縣州縣奏聞舉國傳詠即貞觀時也出弘贊第九第五段五百弟子授記品授學無學人記品野雉忽爾轉身閻王聳然彈指融酥滿器兵衛盈庭神人警寢而進船天帝收經而入藏野雉忽爾轉身師諱道生遁迹虎丘寺有講臺石至今存焉一時居半塘誦法華經忽有一雉常來聽受一日不見師念之夜入夢云某因聽經遂獲改報今在某家為兒子待過數年却來奉事洎師詢之果爾及出家無何童子之年便命終因瘞于林一夕俄而放光輝照塘塢鄉人異之啓看乃獲一舌生青蓮華因是起塔後葺成寺即今半塘寺是也出現應録上之一閻王聳然彈指釋慧度吳興人也菜食長齋誦法華經忽染祖暴亡五日還活自説見閻羅王服遠遊冠衣纓如今王者侍衛亦然始時儀容溫雅亦判罪人事便大瞋怒鬚面動異問度有何業答誦法華經王聳然彈指召出金床與度坐請誦一遍究竟王曰此功德不可思議法師年壽未盡亦以經力扶持更延二紀後果得二十四年陳文帝元嘉時亡春秋七十餘出弘贊第六融酥滿器釋智藏夏州人也年少出家住大興善寺每誦法華經以千遍為限當損心吐血經數日寺僧季暮告藏曰傳聞損心用小便和麵作漿服之即差藏云誓於千遍之內不以穢物熏經此雖為藥終乖宿志乃灑掃庭除奉經置案燒香旋繞禮拜祈誠爾夜忽如睡夢見一梵僧與藏取水和麵作漿授之令服藏飲之未半欻然即悟乃心力倍常還遵舊貫貞觀九年有夏州僧石法師聞藏誦經奉酥三斤以充供養藏盛以一器初日以銅匙取中心桃許明日更取乃見舊處融酥凝滿從夏至秋日取如故藏私心慶悅始悟醍醐自出到八月分此舊酥與同寺僧靈響禪師為響説之又每聞異香及彈指之響屢為幽人喚之令起而前後所誦一萬餘遍儀鳳三年年八十八終於淨影寺焉但以戒足少虧不獲深悟識者恨之出弘贊第八兵衛盈庭釋僧映少出家住江陽永齊寺誦法華經至于年老誦習無輟與一法師並房法師意常嫌誦經聲高妨廢看讀請騫師諫之爾日初夜月朗僧映依常誦經騫師欲往諫止開戶望見映房前有數千人身著甲鎧持弓帶仗叉手胡跪以聽誦經騫師即退歸房明日備向此法師述昨宵所見共往懺悔嫌恨之罪映凡常行往恆聞前後有甲仗之聲開皇年中卒於寺矣出弘贊第七神人警寢而進船釋寶玦張孝秀弟也出家住匡山寺誦法華經甚得通利而不能善攝身口梁邵陵王嫌之夜遣二人密往殺玦玦時在床臥息忽夢見四人到床前手搖玦云邵陵王遣人來殺汝汝那得安眠玦因驚覺即起向後開門仍覺前戶有人入聲心轉惶怖出至房後本有池水由來未經涉入不測深淺恍忽之間忽見一船二人倚篙待之玦乃上船到彼岸竟即見邵陵王所遣二人已在池邊但得水不得過自後折節讀誦善能斷契人所倣效時人呼為盧山殺契者是也出弘贊第六天帝邀經而入藏靜和宅主宅主康宗大王之庶女權臣晉康公之室也知權勢氷山不久歎浮生火宅無安思修出要幸聞圓妙始開白蓮社同願創成力為外護又塑成無量壽如來下安于主殿又願成金字蓮經凡百粧嚴無一不備寄獻于圓妙妙請山人一如書寫如後夢感神人自空而下曰所寫金字法華已安忉利天第二額梨藏中出海東傳弘録第六段法師品見寶塔品鬼莫能害舌不可耕皂客還輸本錢仙翁特請一品空中彈指座上生香鬼莫能害紹興二十八年無為軍指使李遇迎新郡大守於城西既行十餘里忽見百許人從路旁出皆如三五歲兒大呼而前合圍擊之李初不懼與相驅每奮拳必十數輩仆地才仆即起已散復合如是數四有躍而登肩取巾解髮者李益窘走不可脫且擊且前俄一老叟布袍草履不知自何來厲聲咄曰此官人常持法華經若損他豈不纍我叱令退鬼遂散老人亦不現老人疑土地神云出夷堅于志詳見現應録舌不可耕龍朔年間京師高文常讀法華經一日乘馬出順義門忽見兩騎追捉問之乃曰我是閻王遣來追汝文慞惶逃避皆不免即被拽下馬挽却頭髮如同刀割家人輿歸至晚蘇云閻王問我何故盜僧果子因何説三寶之過遂依法伏罪無敢措言王判盜果之罪合吞鐵丸四百五十枚四年受之説過之罪合耕其舌因令放釋遂蘇少選還絶口如吞物通身皰赤有苦楚相又經一日醒云某在地獄四日吞丸乃盡苦毒不可復言方欲拔舌耕之拔而不出勘案所乃曰常讀法華經舌不可出遂放得活今現在化度寺圓滿師處聽法懺悔云出南山三寶感通録詳見弘贊第九卷釋法眼傳及現應録皂客還送本錢嚴恭字近禮本泉州人也家富於財而無兄弟父母愛恭言無所違陳大建初恭請於父母願得錢五萬往楊州市物父母從之恭乘船載錢而下去楊州數十里江中逢一船載黿黿説文云大鱉也將詣市賣之恭問知其故念黿將死因請贖之黿主曰我黿大頭別千錢乃可恭問有幾頭答有五十恭曰我有錢五萬願以贖之黿主喜取錢付黿而去恭盡以黿放江中而空船詣楊州其黿主別恭行十餘里船沒而死是日昏暮烏衣客五十人詣恭本家寄宿并以錢五萬付恭父母曰君兒在楊州附此錢歸願依數受也恭父母怪愕疑恭死客曰兒無恙但不須錢故附歸耳恭父受之記是本錢而皆水溼留客為設食客明旦辭去後月餘恭還家父母大喜既而問附錢所由恭言無之父母説客形狀及附錢日月乃贖黿之日於是知五十客皆所贖黿也父子驚嘆因徙家楊州專勤福業常讀法華經一時讀至見寶塔品輟經嘆曰寶塔之內有二如來分身諸佛其數不少我今何為不能感見慨歎良久至夜忽夢一胡僧語曰若誦此經欲見諸佛當解説書寫流通供養斯願可諧恭因發心造經一百部未及成辦忽得重病乃更發願增造一千部病既愈即於住宅起造經堂若紙若筆必以淨心不行欺詐隨得便營書生常十數人如法供給恭親撿校勞不告倦有人從貸經錢一萬恭不得已與之其人得錢船過中流忽爾沉覆錢失人活是日恭入庫見元錢俱溼頗怪之後見貸人方知沒溺一日忽有異僧年八十許自云從龜茲國來今往羅浮山去聞君造經願請一部恭授與經僧贈金一瓶重四十兩願助造經言已而退莫知所止又有候志從鄱陽來至宮亭有人引入廟見神人案劒而坐問志還識楊州造法華經嚴恭否我欲寄錢一萬入其功德語已便隱志次日至當塗忽有一人來覔候志乃留錢一萬逼令受之而去志思惟知是神錢才到楊州以錢付恭恭志更彌堅造至三千部又有漁人夜見江中火焰焰浮來以船迎之乃是經一函即嚴恭所造後發願云無一字不經眼無一字不用心然嚴恭造經之多至於子孫猶傳其業世號嚴法華也隋季盜賊縱橫至江都皆相與約勿入嚴法華里里賴之獲全前後所寫二千五百餘部本出靈瑞集及感通録詳見弘贊第十及現應録仙翁特請一品昔有一法師常誦法華經一日雲遊經過山路有一僕請入山中小齋及至門有一老人容儀不凡出揖迎入敷一高座老人請云願聞寶塔品師升座誦一遍老人以桃一顆金一葉報之仍命一僕送出師出谷口問其僕曰老人是誰其僕以指書師掌上姓孫名思邈其僕遂不現師食桃不死賣金暴富出現應録空中彈指楊州栖靈寺僧道藝常誦此經每至見寶塔品空中彈指數十下自此之後精誦倍常座上生香釋萬相雍州萬年人也諷誦法華兼敷義理凡講十餘遍曾於簷下誦經忽有白雉馴伏左右以手取之初不驚擾隨相來去或爐中火炭自然而出或床後薦間異香頻發又於房後木上金銅龕像無何而至青一雙兩邊侍立相收得像鳥忽飛去又於中夜靜坐忽然似夢見西北天中寶塔高廣嚴飾望之無際又見東北七星中七佛從星中出金容端粹朗照赫然相悲喜交祫禮拜讚嘆少選之間倐然而滅其所誦凡四千餘遍將終之際令門人稱普賢菩薩名俄自云普賢菩薩來右脅而卒春秋七十四出弘贊第八第七段提婆達多品勸持品身托蓮胎名標花座聖僧教誦海神請聞鴿受人身鬼脫廁報身托蓮胎王淹字公遠琅瑘臨沂人也祖份尚書左僕射淹官至黃門郎新安大守專心佛道無懈晨昏持誦法華積有年稔其弟固亦菜食誦法華經淹亡與固夢云吾得生西方無量壽佛國胎生在鐵葉蓮華內五百歲方得出胎見佛以誦法華苦到故得生西方以愚癡多疑故受胎生止報汝知汝誦經勿懈也於是別矣出弘贊第六名標花座明州開元寺僧可久常誦法華經時稱久法華平生回誦持善利莊嚴淨土元祐八年無病端然坐亡過三日復蘇云吾已神遊淨土其土之相與十六觀經所説莊嚴一同七寶池中所有蓮臺皆標當生者姓名一紫金臺標云大宋成都府廣教院熏法華已生其中又一金臺標明州孫十二郎又一金臺標明州久法華又一銀臺標明州徐道姑言訖復坐亡至後五年徐道姑果坐亡亡時聞異香滿室過十二年孫十二郎卒時聞天樂之聲靈瑞重疊此本出龍舒淨土文詳見現應録聖僧教誦隋時并州人高守節家代信奉而守節尤為精到年十六七時曾遊代都道遇沙門年可六十自稱海雲與之談敘因謂曰兒能誦經不答曰誠其本心雲即將向五臺至一處見三草屋才得容身乃於中止教誦法華經在外乞求給其衣食節屢見胡僧來至與師言笑終日歸去後雲輒問曰識向胡僧不曰不識雲貌似戲言曰是文殊師利菩薩節雖頻承此告未悟其旨後忽使節下山取物仍誡曰夫女人者衆惡之本壞菩提道破涅槃城汝向人間宜其深慎節敬諾受教下山中路乃見一女人年十四五衣服鮮華慈容雅麗乘一白馬直就其前向節曰身有急患要須下乘馬好跳躍制不自由希君扶接濟此微命節遂念師言竟不回顧女亦追尋數里苦切其辭節執志如初俄而致失既還本處具陳其事師曰汝真丈夫矣雖然此是文殊師利菩薩節尚未悟猶謂戲言然於此誦經凡歷三載法華一部甚得精淳後聞長安度人心希剃落晨昏方便咨師欲去師云汝誦得法華大乘種子今已成就汝必欲去當詢好師此之一別難重相見汝京內可於禪定道場依止臥倫禪師節入京求度不遂其心乃往倫所倫曰汝從何來答從五臺山來和尚遺與師為弟子倫曰和尚名誰答曰名海雲倫大驚嘆曰五臺山者文殊所居海雲比丘即是華嚴經中善財童子第三善知識汝何以棄此聖人千劫萬劫無由一遇何其誤耶節乃始悟由來恨不碎其身骨而愚情眷眷猶希再覩遂辭倫返迹日夜奔馳乃至故處都無所見出弘贊第七海神請聞釋緣光新羅人也按梁貢職圖云魏曰斯盧宋曰新羅本東夷震韓之國也光世家名族幼歸緇服識量過人以生居邊壤正教未融以隋仁壽年間來至吳會正逢智者敷弘妙典光伏膺朝夕數年之中歘然大悟智者即令就講妙法華經俊朗之徒莫不神伏後於天台別院增修妙觀忽見數人云天帝請講光默然許之於是奄然氣絶經于旬日顏色如常還歸本識既而器業成就將歸故國與數十人同乘大舶至海中船忽不行見一人乘馬凌波來至船首云海神請師暫到宮中講説光曰貧道此身誓當利物船及餘伴未委如何彼云人並同行船亦勿慮於是舉衆同下行數步但見通衢平直香花遍道海神將百千侍從迎入宮中珠璧焜煌映奪心目因為講法華經一遍大施珍寶還送上船光達至本鄉每弘茲典自少誦持日餘一遍迄於報盡此業無虧年垂八十終於所住闍維既畢髏舌獨存一國見聞咸歎希有光有妹二人早懷清信收之供養數聞髏舌自誦法華妹有不識字處問之皆噵出弘贊第三鴿受人身有一老僧失其名住并州石壁寺禪觀為業貞觀年末房楹上有二鴿雛老師每以餘食飼之後雖漸長羽翼未成乃並學飛俱墮地而死僧因收葬經旬日後夜夢有二小兒告曰兒等為先有罪遂受鴿身比來聞師讀法華經得受人身兒等今於寺側十餘里某村某甲家托生為男十月之外當即誕育僧乃依期往視見此家一婦雙生二男作滿月齋僧呼二孩子曰鴿兒並應曰諾一應之後歲餘始言也出弘贊第九鬼脫廁報釋慧果豫州人也小以蔬苦自業宋初遊京師至瓦冠寺誦法華經嘗於廁前見一鬼致敬於果云昔為衆僧而作維那小不如法墮在噉糞鬼中法師德業高明又慈悲為意願助以濟之方也又云昔有錢三千埋在柿樹根下願取為福果即告衆掘之實得三千為造法華一部并設法會後夢見此鬼云已得改生大勝昔日果以宋大始六年卒春秋七十有六出弘贊第六第八段安樂行品龍天請講鬼虎欽風仙鶴來儀野雞轉報瓶水自滿異香普熏經字放光鴆毒無驗龍天請講釋玄光海東熊川人也越滄溟求中國禪法聞衡山思大禪師雙弘定慧兼善毗尼一志徑造南嶽思察其根器授以法華四安樂行光利若神錐無堅不犯稟而行之常修精進俄證法華三昧思印之曰汝之所證真實不虗當還本國施設善權敷揚吾教光頂禮而別即住錫江南附舶至于大洋偶見彩雲雅樂降節而至空中聲曰天帝召海東玄光禪師於龍宮説親證法門光拱手避讓唯見青衣前導尋入宮城不類人間官府羽衛之設無非鱗介鬼神師既登寶殿次陟高臺如問而談者凡七日事畢龍王躬自送別光復登舟舟人謂泛洋不進者半日而已光遂至熊川翁山結茅卓錫同類相從乃成梵剎南嶽祖堂列二十八賢光居一焉出現應録鬼虎欽風釋弘明會稽山陰人也小出家止山陰雲門寺誦法華經精勤禮懺六時不輟每旦瓶水自滿實諸天童子以為給使也明嘗於雲門寺坐禪虎來入明堂內伏于床下見明端然不動久久乃去又時見一小兒來聽明誦經明曰汝是何人答云昔時此寺沙彌盜帳下食今墮圊中聞上人道業故來聽誦願助方便使免斯纍也明即説法勸化頓解方隱明以齊永明四年卒於柏林寺春秋八十四出弘贊第六仙鶴來儀釋玄璧蘇州吳縣人也住流水寺常講法華猛獸毒蟲妖精惡賊頻繁遘遇未嘗忤其情守常坐一床方四尺未嘗倚臥每講法華二十餘遍州咸來聽受忽有一鶴從外飛來於殿下池中三度含水噴灑於地徑詣佛邊聖僧座上一立不動直至講了然始飛去如此經年後乃恆住上堂即鼓翼引前下講即傾身隨從法師或令其舞即振翮頓足顧影低頭乍起乍低或來去變態殊絶難以具名數州文翰之士莫不偉而同詠璧後不知所終出弘贊第三野雞轉報桂府城五里有雉山寺其始者昔有一僧卓庵此地日誦法華經仍能講説忽有一雉常來伏翼聽受終第五卷雉即不來後八年山下民家生一男子年始八歲不葷不戲堅欲投其師出家父母聽之一日僧浴令兒淨背堅不肯袒衣僧問其故答曰某前身即雉也因聽師講誦故報為人今腋下猶有雉毳故不袒也僧因授是經前五卷覽同舊習後二卷則不能也從此山以雉名因山置寺寺猶存也此本出戒殺類見現應録瓶水自滿釋僧定不知何許人也住江陽禪衆寺誦法華經甚好聲韻不能謹節流宕塵俗然每感諸天童子為之給使有時醉臥法衣離身自然卷襞引被整覆衣服塵垢未暇浣治乃復取之久以香潔或瓶水自滿或地恆掃淨定眠喜唾一時酒醒見天童子在前遍身咕唾自爾折節遵修戒業後不知所終出弘贊第六異香普熏清信士央呵擔住京城西南豐谷鄉少懷善念常誦法華行安樂行慈悲在意不乘畜産虗幻為心名霑令史往還京省以誦業相仍恐路逢相識人事暄涼便廢所誦故所行必由小徑低聲怡顏緣念相續及終之時感異香殊氣充於村曲後十年妻亡重發唯舌鮮好餘皆朽盡出弘贊第八經字放光後魏太子中庶子御史中承陸載本吳人也仕魏有才調善談謔而性愛虗淨常以佛法為意誦法華經末年精到經字放光頻感舍利出弘贊第六鴆毒無驗釋法相河南人也東晉義熙中忽悟無常超然出俗廓爾幽閉不偶朋執誦法華經日夜不懈曾因經行泰山祠日暮因宿廟側民家夜起誦經忽聞扣門聲相時出看見有一人玄衣武冠見相致敬云是泰山府君聞師誦經故來參聽弟子廟中一石函在多有財物以布施師師可開取其石蓋重過千鈎人莫勝舉相試提之飄然而開於是取得絹一百匹許錢百餘貫以施貧人濟諸窮者後渡江止越城寺忽然失志遊宕無度時鎮北將軍司馬恬惡其無度招而鴆之頻傾三鐘神色不變湛然無擾括大異之慚懼悔愧每加供養出弘贊第六第九段從地涌出品如來壽量品分別功德品冥授補闕帝親試通賜壽題肩應病授藥相師已定豈期延壽天帝相邀却向西方冥授補闕竟陵王蕭子良齊永明七年請僧雲副為善知識副共王造法華經千部王亦澡潔中表手寫法華經一部永明十一年四月末副夢一人送經一卷云言有誤明日偶得一部法華試略披看遂見第五卷壽量品有一句異云一塵一劫于時募集數十部經悉無此句即言推義乃是法華之極致是以即經文便有白鶴來翔以應嘉瑞副後不知所終出弘贊第十帝親試通權適字持正安東府人也少業文才政和年中以賓貢入宋配國學擢為甲科第一人將還本國相者曰君才高命短年不過四十位不過五品宜誦大乘經以資笇祿公心然之約三日了誦法華經皇帝聞之呼令前誦無一字錯皇情大悅賜觀音像法華塔各一軸及還本國享壽攸久歷盡清華拜為雙學士出海東傳弘録及適本傳賜壽題肩釋法朗河北武城人也住彭城淨道寺為沙彌時誦法華經自少至老誦習無懈至年五十三開皇十三年死經七日見閻羅王王前有六道人王問初一僧何德業初人答誦維摩經王曰度南邊立問第二僧有何德業答誦涅槃經十卷王曰亦南邊立問第三僧有何德業答誦金光明經王曰亦南邊立問第四僧答講涅槃經王曰度西行立問第五僧答講十地論王斂眉而言度北行立第六問法朗云有何行業答誦法花經王曰度東行立王問第六僧竟遣人領北行立者向地獄道領西行立者向畜生道領南行三僧向人道次語法朗領往天道令見其生處可放還家賜壽八十五歲朗從天宮還忽然而活看左臂上隱隱有赤字作八十五歲字出弘贊第七應病授藥清信女章氏隋右光祿大夫陳陵妻也誦法華經每恨四體羸乏不堪久誦忽夢僧持一梡藥作黃色來在章前與之令服章服已經小時因腹痛驚覺腹痛既甚須臾下痢純作黃色似夢所見痢竟所患都差自後四體休健常能讀誦日夜一遍無復困極也出弘贊第七相師已定豈期延壽劉弘仁年十八時任國子學生與同志十人於相師處求相吉凶相師皆尅其富貴貧賤之時夭壽年月之數謂弘仁曰年至五十一其年四月十一日必死弘仁時任蘇州嘉興縣令其餘九人皆如相師之説禍福不差及弘仁十八已來吉凶皆驗至今正年五十一矣自度至期必死以四月一日遂詣州與諸官僚取訣時韓王元嘉為蘇州刺史問其所由弘仁具陳其事王教之修福弘仁至四月八日遂即遇疾甚篤王請諸寺僧尼為弘仁轉法華經一千遍至十一日轉經數畢諸僧又為弘仁更讀一百遍弘仁流汗𬰃霂所患都愈平復如常信知福力誠不可量也出弘贊第九天帝邀相却向西方釋跋澄少出家精神暗鈍而長齋蔬食年二十五發心誦法華經願生西方日誦一行或至半偈或都不得年登八十方始通利後因眠息夢見一人著朱衣武冠手抱請疏開示澄云天帝遣來奉請澄答云貧道願生西方且忉利天雖是勝處然不稱貧道所願朱衣人於是即去睡覺召諸弟子述向所夢明日又夢七寶浮圖澄身居五層上向西望見寶繩階道無有涯際有二金剛執杵在兩廂立數箇青衣童子捉白拂拂此階道問童子云此是何處答云此是西方寶繩階道來迎澄法師睡覺述斯以語諸弟子云汝可貿吾三衣六物作一供齋依語營辦齋前問大衆云見千佛以不衆云不見復問聞非常香氣以不衆云咸聞於是端坐正念而終出弘贊第六及現應録
